; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Upload- und Monitor-Ports
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

; Dateisystem (SPIFFS fuer Bilder, 1.5 MB Platz)
board_build.filesystem = spiffs
board_build.partitions = default_8MB.csv

; Libraries
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    bodmer/TFT_eSPI@^2.5.43
    bodmer/TJpg_Decoder@^1.1.0

; TFT_eSPI Konfiguration via Build-Flags (statt User_Setup.h)
build_flags =
    ; Display-Treiber: ST7796S (480x320)
    -D USER_SETUP_LOADED=1
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480

    ; ESP32-S3: FSPI-Port verwenden (VSPI existiert nicht auf S3)
    -D USE_FSPI_PORT=1

    ; SPI-Pins fuer Display
    -D TFT_MOSI=11
    -D TFT_MISO=13
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=9
    -D TFT_RST=8

    ; Hintergrundbeleuchtung
    -D TFT_BL=14
    -D TFT_BACKLIGHT_ON=HIGH

    ; Touch (XPT2046)
    -D TOUCH_CS=15

    ; SPI-Frequenzen
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000

    ; Farbformat
    -D TFT_RGB_ORDER=TFT_BGR
